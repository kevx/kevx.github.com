<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BNC-COA Word Lab</title>
    <script src="javascripts/scale.fix.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg-0: #08111f;
            --bg-1: #0d1730;
            --bg-2: rgba(12, 18, 34, 0.78);
            --panel: rgba(14, 22, 41, 0.9);
            --panel-soft: rgba(255, 255, 255, 0.03);
            --line: rgba(255, 255, 255, 0.11);
            --text: #e9eefc;
            --muted: #a8b4d6;
            --accent: #7dd3fc;
            --accent-2: #f9a8d4;
            --accent-3: #c4b5fd;
            --good: #8ef0bf;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: "Trebuchet MS", "Segoe UI", "Avenir Next", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(125, 211, 252, 0.24), transparent 32%),
                radial-gradient(circle at 80% 10%, rgba(244, 114, 182, 0.18), transparent 24%),
                radial-gradient(circle at bottom right, rgba(196, 181, 253, 0.16), transparent 30%),
                linear-gradient(160deg, var(--bg-0), var(--bg-1) 58%, #111a35 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 92%);
            opacity: 0.35;
        }

        button,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app-shell {
            width: min(1180px, calc(100% - 24px));
            margin: 18px auto 28px;
            display: grid;
            gap: 18px;
            position: relative;
            z-index: 1;
        }

        .hero,
        .panel,
        .modal {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)), var(--bg-2);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .hero {
            border-radius: var(--radius-xl);
            padding: 16px 18px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
            gap: 12px 18px;
            align-items: end;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 12px;
            line-height: 1;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 4vw, 3.5rem);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        .lede {
            max-width: 62ch;
            margin-top: 14px;
            color: var(--muted);
            line-height: 1.6;
        }

        .picker {
            display: grid;
            gap: 10px;
            justify-items: stretch;
        }

        .picker span {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .picker select {
            width: 100%;
            appearance: none;
            border: 1px solid rgba(125, 211, 252, 0.28);
            border-radius: 18px;
            padding: 16px 18px;
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04)),
                linear-gradient(140deg, rgba(125, 211, 252, 0.16), rgba(244, 114, 182, 0.14));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .panel {
            border-radius: var(--radius-xl);
            padding: 20px;
        }

        .panel-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }

        .panel-head h2 {
            font-size: clamp(1.4rem, 2vw, 2rem);
            letter-spacing: -0.03em;
        }

        .panel-head p {
            margin-top: 6px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .count-pill {
            flex: none;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(125, 211, 252, 0.2);
            background: rgba(125, 211, 252, 0.08);
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 8px;
        }

        .word-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 9px 8px;
            min-height: 42px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
            color: var(--text);
            text-align: left;
            line-height: 1.12;
            font-size: 13px;
            word-break: break-word;
            transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
        }

        .word-card:hover,
        .word-card:focus-visible {
            transform: translateY(-1px);
            border-color: rgba(125, 211, 252, 0.45);
            background: linear-gradient(180deg, rgba(125, 211, 252, 0.14), rgba(255, 255, 255, 0.04));
            outline: none;
        }

        .word-card small {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 10px;
            letter-spacing: 0.02em;
        }

        .empty-state {
            padding: 36px 12px;
            text-align: center;
            color: var(--muted);
            line-height: 1.7;
        }

        .hidden {
            display: none !important;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            padding: 18px;
            background: rgba(5, 9, 18, 0.72);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            width: min(920px, 100%);
            max-height: min(88vh, 900px);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: start;
            padding: 20px 20px 0;
        }

        .modal-header {
            padding-right: 16px;
        }

        .modal-header h3 {
            margin-top: 6px;
            font-size: clamp(1.4rem, 2.5vw, 2.3rem);
            letter-spacing: -0.03em;
        }

        .modal-header p {
            color: var(--muted);
            margin-top: 6px;
            line-height: 1.55;
        }

        .modal-close {
            border: 0;
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            flex: none;
        }

        .modal-close:hover,
        .modal-close:focus-visible {
            background: rgba(125, 211, 252, 0.16);
            outline: none;
        }

        .modal-scroll {
            overflow: auto;
            padding: 20px;
        }

        .modal-loading,
        .modal-error,
        .modal-empty {
            border: 1px dashed rgba(255, 255, 255, 0.16);
            border-radius: 20px;
            padding: 18px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.03);
            line-height: 1.7;
        }

        .retry-button {
            margin-top: 14px;
            border: 1px solid rgba(125, 211, 252, 0.28);
            border-radius: 999px;
            background: rgba(125, 211, 252, 0.1);
            color: var(--text);
            padding: 10px 14px;
        }

        .entry-card {
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 22px;
            padding: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
        }

        .entry-card + .entry-card {
            margin-top: 14px;
        }

        .entry-head {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 7px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 12px;
            line-height: 1;
        }

        .pill.accent {
            border-color: rgba(125, 211, 252, 0.2);
            background: rgba(125, 211, 252, 0.08);
            color: var(--accent);
        }

        .pill.good {
            border-color: rgba(142, 240, 191, 0.2);
            background: rgba(142, 240, 191, 0.08);
            color: var(--good);
        }

        .meta-block {
            margin-top: 12px;
            display: grid;
            gap: 8px;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .meta-label {
            margin-right: 6px;
            color: var(--muted);
        }

        details.sense-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            background: rgba(5, 9, 18, 0.2);
            overflow: hidden;
        }

        details.sense-card + details.sense-card {
            margin-top: 12px;
        }

        details.sense-card summary {
            list-style: none;
            cursor: pointer;
            padding: 14px 15px;
            display: grid;
            gap: 8px;
        }

        details.sense-card summary::-webkit-details-marker {
            display: none;
        }

        .sense-summary-title {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .sense-index {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(125, 211, 252, 0.14);
            color: var(--accent);
            flex: none;
            font-size: 12px;
            font-weight: 700;
        }

        .sense-definition {
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
        }

        .sense-translations {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sense-body {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 15px 16px;
            display: grid;
            gap: 12px;
        }

        .block-title {
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent-3);
            margin-bottom: 8px;
        }

        .list-stack {
            display: grid;
            gap: 8px;
        }

        .list-item {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            line-height: 1.55;
        }

        .muted {
            color: var(--muted);
        }

        .source-note {
            margin-top: 14px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        @media (max-width: 820px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .panel-head {
                align-items: start;
                flex-direction: column;
            }
        }

        @media (max-width: 640px) {
            .app-shell {
                width: min(100% - 16px, 1180px);
                margin: 8px auto 18px;
                gap: 12px;
            }

            .hero,
            .panel {
                border-radius: 20px;
                padding: 14px;
            }

            .word-grid {
                grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
                gap: 7px;
            }

            .modal-overlay {
                padding: 8px;
                align-items: stretch;
            }

            .modal {
                max-height: calc(100vh - 16px);
                border-radius: 22px;
            }

            .modal-top,
            .modal-scroll {
                padding-left: 14px;
                padding-right: 14px;
            }

            .modal-top {
                padding-top: 14px;
            }

            .modal-scroll {
                padding-bottom: 14px;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell" id="appRoot">
        <section class="hero" aria-label="BNC-COA vocabulary lab">
            <div>
                <p class="eyebrow">BNC-COA word trainer</p>
            </div>
            <label class="picker" for="levelSelect">
                <span>Choose list</span>
                <select id="levelSelect" aria-label="Choose BNC-COA list level"></select>
            </label>
        </section>

        <section class="panel" aria-live="polite">
            <div class="panel-head">
                <div>
                    <h2 id="listTitle">Loading lists</h2>
                    <p id="listSummary">Preparing the extracted resource file.</p>
                </div>
                <div class="count-pill" id="wordCount">0 words</div>
            </div>

            <div id="wordGrid" class="word-grid" hidden></div>
            <div id="emptyState" class="empty-state">Loading the vocabulary data.</div>
        </section>
    </main>

    <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalSubtitle">
            <div class="modal-top">
                <div class="modal-header">
                    <p class="eyebrow">Dictionary popup</p>
                    <h3 id="modalTitle">Word</h3>
                    <p id="modalSubtitle">Tap a word to load the FreeDictionary entry.</p>
                </div>
                <button id="modalClose" class="modal-close" type="button">Close</button>
            </div>
            <div id="modalScroll" class="modal-scroll">
                <div id="modalBody" class="modal-loading">Waiting for a word selection.</div>
            </div>
        </div>
    </div>

    <script src="data/bnc-coa-4k-10k.js"></script>
    <script>
        (function () {
            const LEVELS = ['4000', '5000', '6000', '7000', '8000', '9000', '10000'];
            const state = {
                activeLevel: LEVELS[0],
                activeWord: '',
                pendingController: null,
                lastTrigger: null,
            };

            const elements = {
                levelSelect: document.getElementById('levelSelect'),
                listTitle: document.getElementById('listTitle'),
                listSummary: document.getElementById('listSummary'),
                wordCount: document.getElementById('wordCount'),
                wordGrid: document.getElementById('wordGrid'),
                emptyState: document.getElementById('emptyState'),
                modalOverlay: document.getElementById('modalOverlay'),
                modalTitle: document.getElementById('modalTitle'),
                modalSubtitle: document.getElementById('modalSubtitle'),
                modalBody: document.getElementById('modalBody'),
                modalClose: document.getElementById('modalClose'),
                modalScroll: document.getElementById('modalScroll'),
            };

            if (!window.BNC_COA_DATA || !window.BNC_COA_DATA.lists) {
                elements.emptyState.textContent = 'Missing BNC-COA resource file. Generate data/bnc-coa-4k-10k.js first.';
                return;
            }

            const data = window.BNC_COA_DATA;

            function escapeHtml(value) {
                return String(value ?? '')
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#39;');
            }

            function uniqueValues(values) {
                return Array.from(new Set(values.filter(Boolean)));
            }

            function joinOrDash(values) {
                const cleaned = uniqueValues(values.map((item) => String(item).trim()).filter(Boolean));
                return cleaned.length ? cleaned.join(' · ') : '—';
            }

            function collectChineseTranslations(translations) {
                if (!Array.isArray(translations)) {
                    return [];
                }

                const results = [];
                translations.forEach((translation) => {
                    const code = String(translation?.language?.code || '').toLowerCase();
                    const name = String(translation?.language?.name || '').toLowerCase();
                    if (code.startsWith('zh') || name.includes('chinese')) {
                        const word = String(translation?.word || '').trim();
                        if (word) {
                            results.push(word);
                        }
                    }
                });

                return uniqueValues(results);
            }

            function createSenseCard(sense, index) {
                const translations = collectChineseTranslations(sense?.translations);
                const definition = String(sense?.definition || 'No definition available.');
                const tags = Array.isArray(sense?.tags) ? sense.tags : [];
                const examples = Array.isArray(sense?.examples) ? sense.examples.filter(Boolean) : [];
                const quotes = Array.isArray(sense?.quotes) ? sense.quotes.filter(Boolean) : [];
                const synonyms = Array.isArray(sense?.synonyms) ? sense.synonyms.filter(Boolean) : [];
                const antonyms = Array.isArray(sense?.antonyms) ? sense.antonyms.filter(Boolean) : [];
                const subsenses = Array.isArray(sense?.subsenses) ? sense.subsenses : [];

                const extraBadges = [];
                if (tags.length) {
                    extraBadges.push(tags.map((tag) => `<span class="pill">${escapeHtml(tag)}</span>`).join(''));
                }
                if (synonyms.length) {
                    extraBadges.push(`<span class="pill accent">Synonyms: ${escapeHtml(joinOrDash(synonyms))}</span>`);
                }
                if (antonyms.length) {
                    extraBadges.push(`<span class="pill good">Antonyms: ${escapeHtml(joinOrDash(antonyms))}</span>`);
                }

                const bodySections = [];
                if (examples.length) {
                    bodySections.push(`
                        <div>
                            <div class="block-title">Examples</div>
                            <div class="list-stack">
                                ${examples.slice(0, 3).map((example) => `<div class="list-item">${escapeHtml(example)}</div>`).join('')}
                            </div>
                        </div>
                    `);
                }

                if (quotes.length) {
                    bodySections.push(`
                        <div>
                            <div class="block-title">Quotes</div>
                            <div class="list-stack">
                                ${quotes.slice(0, 2).map((quote) => {
                                    const reference = quote?.reference ? `<div class="muted" style="margin-top:6px;">${escapeHtml(quote.reference)}</div>` : '';
                                    return `<div class="list-item">${escapeHtml(quote?.text || '')}${reference}</div>`;
                                }).join('')}
                            </div>
                        </div>
                    `);
                }

                if (subsenses.length) {
                    bodySections.push(`
                        <div>
                            <div class="block-title">Subsenses</div>
                            <div class="list-stack">
                                ${subsenses.slice(0, 4).map((subsense, subsenseIndex) => createSenseCard(subsense, `${index}.${subsenseIndex + 1}`)).join('')}
                            </div>
                        </div>
                    `);
                }

                return `
                    <details class="sense-card" ${index === 1 ? 'open' : ''}>
                        <summary>
                            <div class="sense-summary-title">
                                <span class="sense-index">${escapeHtml(index)}</span>
                                <span class="sense-definition">${escapeHtml(definition)}</span>
                            </div>
                            <div class="sense-translations">
                                ${translations.length ? translations.map((translation) => `<span class="pill accent">${escapeHtml(translation)}</span>`).join('') : '<span class="pill">No Chinese translation found</span>'}
                            </div>
                        </summary>
                        <div class="sense-body">
                            ${extraBadges.length ? `<div class="meta-row">${extraBadges.join('')}</div>` : ''}
                            ${bodySections.join('')}
                        </div>
                    </details>
                `;
            }

            function renderEntry(entry, entryIndex) {
                const language = entry?.language?.name || 'Unknown language';
                const partOfSpeech = entry?.partOfSpeech || 'unknown part of speech';
                const pronunciations = Array.isArray(entry?.pronunciations) ? entry.pronunciations : [];
                const forms = Array.isArray(entry?.forms) ? entry.forms : [];
                const senses = Array.isArray(entry?.senses) ? entry.senses : [];
                const synonyms = Array.isArray(entry?.synonyms) ? entry.synonyms : [];
                const antonyms = Array.isArray(entry?.antonyms) ? entry.antonyms : [];

                const pronunciationMarkup = pronunciations.length
                    ? `<div class="meta-row">${pronunciations.map((pronunciation) => {
                        const text = pronunciation?.text || '';
                        const type = pronunciation?.type || '';
                        const tags = Array.isArray(pronunciation?.tags) ? pronunciation.tags : [];
                        const label = [type, tags.join(', ')].filter(Boolean).join(' · ');
                        return `<span class="pill">/${escapeHtml(text)}/ ${label ? `<span class="muted">${escapeHtml(label)}</span>` : ''}</span>`;
                    }).join('')}</div>`
                    : '';

                const formsMarkup = forms.length
                    ? `<div><div class="block-title">Forms</div><div class="meta-row">${forms.map((form) => {
                        const formWord = form?.word || '';
                        const formTags = Array.isArray(form?.tags) ? form.tags : [];
                        return `<span class="pill">${escapeHtml(formWord)}${formTags.length ? ` <span class="muted">(${escapeHtml(formTags.join(', '))})</span>` : ''}</span>`;
                    }).join('')}</div></div>`
                    : '';

                const senseMarkup = senses.length
                    ? senses.map((sense, senseIndex) => createSenseCard(sense, senseIndex + 1)).join('')
                    : '<div class="modal-empty">No senses were returned for this entry.</div>';

                const relationsMarkup = [];
                if (synonyms.length) {
                    relationsMarkup.push(`<div><div class="block-title">Synonyms</div><div class="meta-row">${synonyms.slice(0, 12).map((word) => `<span class="pill accent">${escapeHtml(word)}</span>`).join('')}</div></div>`);
                }
                if (antonyms.length) {
                    relationsMarkup.push(`<div><div class="block-title">Antonyms</div><div class="meta-row">${antonyms.slice(0, 12).map((word) => `<span class="pill good">${escapeHtml(word)}</span>`).join('')}</div></div>`);
                }

                return `
                    <article class="entry-card">
                        <div class="entry-head">
                            <span class="pill accent">${escapeHtml(language)}</span>
                            <span class="pill">${escapeHtml(partOfSpeech)}</span>
                            <span class="pill">Entry ${escapeHtml(entryIndex)}</span>
                        </div>
                        ${pronunciationMarkup}
                        ${formsMarkup}
                        <div class="meta-block">${senseMarkup}</div>
                        ${relationsMarkup.length ? `<div class="meta-block">${relationsMarkup.join('')}</div>` : ''}
                    </article>
                `;
            }

            function renderModalLoading(word) {
                elements.modalTitle.textContent = word;
                elements.modalSubtitle.textContent = 'Fetching the dictionary response and filtering Chinese translations.';
                elements.modalBody.innerHTML = '<div class="modal-loading">Loading the FreeDictionary entry.</div>';
            }

            function renderModalError(message, word, retryHandler) {
                elements.modalTitle.textContent = word;
                elements.modalSubtitle.textContent = 'The dictionary lookup did not complete.';
                elements.modalBody.innerHTML = `
                    <div class="modal-error">
                        ${escapeHtml(message)}
                        <div>
                            <button type="button" class="retry-button" id="modalRetry">Try again</button>
                        </div>
                    </div>
                `;

                const retryButton = document.getElementById('modalRetry');
                if (retryButton) {
                    retryButton.addEventListener('click', retryHandler, { once: true });
                }
            }

            function renderModalEmpty(word, title) {
                elements.modalTitle.textContent = word;
                elements.modalSubtitle.textContent = title;
                elements.modalBody.innerHTML = '<div class="modal-empty">No dictionary entries were returned for this word.</div>';
            }

            function renderModalContent(word, payload) {
                const entries = Array.isArray(payload?.entries) ? payload.entries : [];
                const source = payload?.source || {};
                const sourceLicense = source?.license?.name ? `${source.license.name}` : 'Wiktionary source';
                const sourceUrl = source?.url ? `${source.url}` : 'FreeDictionary API';

                elements.modalTitle.textContent = word;
                elements.modalSubtitle.textContent = `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'} found. Chinese translations only are shown inside each sense.`;

                if (!entries.length) {
                    renderModalEmpty(word, 'The lookup succeeded, but the API returned no entries.');
                    return;
                }

                const bodyMarkup = entries.map((entry, index) => renderEntry(entry, index + 1)).join('');
                const sourceMarkup = `
                    <div class="source-note">
                        Data source: ${escapeHtml(sourceUrl)}. License: ${escapeHtml(sourceLicense)}.
                    </div>
                `;

                elements.modalBody.innerHTML = bodyMarkup + sourceMarkup;
            }

            async function lookupWord(word) {
                if (state.pendingController) {
                    state.pendingController.abort();
                }

                const controller = new AbortController();
                state.pendingController = controller;
                renderModalLoading(word);

                try {
                    const response = await fetch(`https://freedictionaryapi.com/api/v1/entries/all/${encodeURIComponent(word)}?translations=true`, {
                        signal: controller.signal,
                    });

                    if (!response.ok) {
                        throw new Error(`Dictionary request failed with status ${response.status}.`);
                    }

                    const payload = await response.json();
                    if (state.pendingController !== controller) {
                        return;
                    }

                    renderModalContent(word, payload);
                } catch (error) {
                    if (controller.signal.aborted) {
                        return;
                    }

                    const retry = () => lookupWord(word);
                    renderModalError(error?.message || 'Could not load the dictionary entry.', word, retry);
                } finally {
                    if (state.pendingController === controller) {
                        state.pendingController = null;
                    }
                }
            }

            function openModal(word, trigger) {
                state.activeWord = word;
                state.lastTrigger = trigger || null;
                elements.modalOverlay.classList.remove('hidden');
                elements.modalOverlay.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
                lookupWord(word);
                setTimeout(() => elements.modalClose.focus(), 0);
            }

            function closeModal() {
                elements.modalOverlay.classList.add('hidden');
                elements.modalOverlay.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                if (state.pendingController) {
                    state.pendingController.abort();
                    state.pendingController = null;
                }
                if (state.lastTrigger && typeof state.lastTrigger.focus === 'function') {
                    state.lastTrigger.focus();
                }
                state.lastTrigger = null;
            }

            function renderWords() {
                const words = Array.isArray(data.lists?.[state.activeLevel]) ? data.lists[state.activeLevel] : [];
                const label = data.levelLabels?.[state.activeLevel] || `${state.activeLevel} list`;

                elements.listTitle.textContent = label;
                elements.listSummary.textContent = `${state.activeLevel} tier with ${words.length.toLocaleString('en-US')} words ready to review.`;
                elements.wordCount.textContent = `${words.length.toLocaleString('en-US')} words`;

                elements.wordGrid.innerHTML = '';
                elements.wordGrid.hidden = words.length === 0;
                elements.emptyState.classList.toggle('hidden', words.length > 0);
                if (!words.length) {
                    elements.emptyState.textContent = `No words were found for the ${state.activeLevel} tier.`;
                    return;
                }

                const fragment = document.createDocumentFragment();
                words.forEach((word, index) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'word-card';
                    button.textContent = word;
                    button.setAttribute('aria-label', `Open dictionary for ${word}`);

                    const position = document.createElement('small');
                    position.textContent = `#${index + 1}`;
                    button.appendChild(position);

                    button.addEventListener('click', () => openModal(word, button));
                    fragment.appendChild(button);
                });

                elements.wordGrid.appendChild(fragment);
            }

            function populateSelect() {
                elements.levelSelect.innerHTML = LEVELS.map((level) => {
                    const count = Array.isArray(data.lists?.[level]) ? data.lists[level].length : 0;
                    return `<option value="${level}">${level} — ${count.toLocaleString('en-US')} words</option>`;
                }).join('');

                elements.levelSelect.value = state.activeLevel;
            }

            function initialRender() {
                populateSelect();
                renderWords();
            }

            elements.levelSelect.addEventListener('change', (event) => {
                state.activeLevel = event.target.value;
                renderWords();
            });

            elements.modalClose.addEventListener('click', closeModal);
            elements.modalOverlay.addEventListener('click', (event) => {
                if (event.target === elements.modalOverlay) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && !elements.modalOverlay.classList.contains('hidden')) {
                    closeModal();
                }
            });

            initialRender();
        })();
    </script>
</body>
</html>
